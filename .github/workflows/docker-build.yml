name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context:
        required: true
        type: string
      file:
        required: true
        type: string
      tags:
        required: true
        type: string
      build_frontend:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        if: ${{ inputs.build_frontend }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        if: ${{ inputs.build_frontend }}
        run: |
          cd frontend
          bun install
          bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: true
          tags: ${{ inputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

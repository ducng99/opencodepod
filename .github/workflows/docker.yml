name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - Dockerfile
      - cmd/**
      - internal/**
      - frontend/**
      - go.mod
      - go.sum
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/ducng99/opencodepod-client:latest

  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/ducng99/opencodepod-server:latest

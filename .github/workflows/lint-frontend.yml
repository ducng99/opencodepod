name: Lint frontend

on:
  push:
    branches:
      - main
    paths:
      - frontend/**/*.{ts,tsx,js,jsx}
      - frontend/tsconfig.json
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-slim

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Lint
        working-directory: frontend
        run: |
          bun install
          bun run lint:check

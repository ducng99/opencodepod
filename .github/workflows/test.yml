name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "**/*_test.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"
  pull_request:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -count=1 -parallel 4 -timeout 5m

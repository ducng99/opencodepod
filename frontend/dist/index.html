<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodePod</title>
<style>
  :root{ --bg:#0f1117; --card:#161b22; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --danger:#f85149; --success:#238636; --border:#30363d; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:var(--bg); color:var(--text); }
  header{ padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  header h1{ margin:0; font-size:1.25rem; }
  .container{ max-width:1100px; margin:0 auto; padding:1.25rem; }
  .toolbar{ display:flex; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }
  input, select, button{ padding:.5rem .65rem; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--text); font:inherit; }
  button{ cursor:pointer; border:none; }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-danger{ background:var(--danger); color:#fff; }
  .btn-success{ background:var(--success); color:#fff; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem; }
  .card h3{ margin:0 0 .25rem; }
  .card .meta{ color:var(--muted); font-size:.85rem; margin-bottom:.5rem; }
  .card .ports{ font-size:.9rem; margin:.5rem 0; }
  .card .actions{ display:flex; gap:.5rem; margin-top:.75rem; flex-wrap:wrap; }
  .badge{ display:inline-block; padding:.15rem .45rem; border-radius:999px; font-size:.75rem; font-weight:600; text-transform:uppercase; }
  .badge-running{ background:#112a1e; color:#3fb950; border:1px solid #238636; }
  .badge-exited{ background:#2a1515; color:#f85149; border:1px solid #f85149; }
  .badge-creating{ background:#1a1b2e; color:#a5b4fc; border:1px solid #6366f1; }
  pre{ background:#0d1117; border:1px solid var(--border); border-radius:6px; padding:.5rem; overflow:auto; font-size:.85rem; }
</style>
</head>
<body>
<header><h1>CodePod</h1><div id="status" class="meta" style="margin:0">Connecting…</div></header>
<div class="container">
  <div class="toolbar">
    <input id="newName" placeholder="Project name" />
    <input id="newRepo" placeholder="Git repo (optional)" style="min-width:220px" />
    <input id="newImage" placeholder="Image (optional)" style="min-width:180px" />
    <button class="btn-primary" onclick="createProject()">+ New Project</button>
  </div>
  <div id="grid" class="grid"></div>
</div>

<script>
const api = (path) => '/api' + path;
let tailnetHost = '';

async function loadConfig() {
  // Tailnet host is injected by the server if available; otherwise empty.
  // We can discover it from the first project response if present.
}

async function list() {
  const r = await fetch(api('/projects'));
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function create(body) {
  const r = await fetch(api('/projects'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function start(id) {
  const r = await fetch(api(`/projects/${id}/start`), { method:'POST' });
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function stop(id) {
  const r = await fetch(api(`/projects/${id}/stop`), { method:'POST' });
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function remove(id) {
  const r = await fetch(api(`/projects/${id}`), { method:'DELETE' });
  if(!r.ok) throw new Error(await r.text());
}

function badge(status) {
  const s = (status || '').toLowerCase();
  if(s === 'running') return '<span class="badge badge-running">Running</span>';
  if(s === 'exited') return '<span class="badge badge-exited">Stopped</span>';
  return '<span class="badge badge-creating">'+escapeHtml(status)+'</span>';
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function host() {
  // best-effort tailnet host from current URL hostname
  return tailnetHost || location.hostname;
}

function render(projects) {
  const g = document.getElementById('grid');
  if(!projects.length) {
    g.innerHTML = '<div style="color:var(--muted)">No projects yet.</div>';
    return;
  }
  g.innerHTML = projects.map(p => {
    const sshCmd = p.ssh_port ? `ssh -p ${p.ssh_port} coder@${host()}` : '';
    const webUrl = p.web_port ? `http://${host()}:${p.web_port}` : '';
    return `<div class="card">
      <h3>${escapeHtml(p.name || 'Untitled')}</h3>
      <div class="meta">${escapeHtml(p.id)} • ${escapeHtml(p.image || '')} ${badge(p.status)}</div>
      ${p.git_repo ? `<div class="meta"><a href="${escapeHtml(p.git_repo)}" target="_blank" style="color:var(--accent)">repo</a></div>` : ''}
      <div class="ports">
        ${p.ssh_port ? `<div>SSH: <code>${escapeHtml(sshCmd)}</code></div>` : ''}
        ${p.web_port ? `<div>Web: <a href="${escapeHtml(webUrl)}" target="_blank" style="color:var(--accent)">${escapeHtml(webUrl)}</a></div>` : ''}
      </div>
      <div class="actions">
        ${p.status !== 'running' ? `<button class="btn-success" onclick="actStart('${p.id}')">Start</button>` : `<button class="btn-primary" onclick="actStop('${p.id}')">Stop</button>`}
        <button class="btn-danger" onclick="actDelete('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function refresh() {
  try {
    const data = await list();
    document.getElementById('status').textContent = `Last updated ${new Date().toLocaleTimeString()}`;
    render(data);
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

async function createProject() {
  const name = document.getElementById('newName').value.trim();
  const repo = document.getElementById('newRepo').value.trim();
  const image = document.getElementById('newImage').value.trim();
  if(!name) { alert('Name is required'); return; }
  try {
    await create({ name, git_repo: repo || undefined, image: image || undefined });
    document.getElementById('newName').value = '';
    document.getElementById('newRepo').value = '';
    document.getElementById('newImage').value = '';
    await refresh();
  } catch(e) { alert(e.message); }
}

async function actStart(id) {
  try { await start(id); await refresh(); } catch(e) { alert(e.message); }
}
async function actStop(id) {
  try { await stop(id); await refresh(); } catch(e) { alert(e.message); }
}
async function actDelete(id) {
  if(!confirm('Delete project and its volume? This cannot be undone.')) return;
  try { await remove(id); await refresh(); } catch(e) { alert(e.message); }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
